services:
  fusionpbx:
    build: .
    image: fusionpbx-docker:latest
    container_name: fusionpbx
    restart: unless-stopped
    network_mode: "host"
    volumes:
      - freeswitch_data:/var/lib/freeswitch
      - freeswitch_etc:/etc/freeswitch
      - freeswitch_nginx_etc:/etc/nginx
      - freeswitch_logs:/var/log/freeswitch
      - fusionpbx_etc:/etc/fusionpbx
      - fusionpbx_www:/var/www/fusionpbx
      - fusionpbx_db:/var/lib/postgresql
    cap_add:
      - SYS_NICE
    ulimits:
      rtprio: 99
      memlock: -1
volumes:
  freeswitch_data:
  freeswitch_etc:
  freeswitch_nginx_etc:
  freeswitch_logs:
  fusionpbx_etc:
  fusionpbx_www:
  fusionpbx_db:
